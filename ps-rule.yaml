# PSRule for Azure — suppression configuration
# Rules suppressed here are non-fixable on Consumption Plan (no VNet integration available).
# See .gdnsuppress for justifications.
suppression:
  # Storage account: network firewall rules require VNet integration, not available on
  # Consumption Plan — would break the function app's AzureWebJobsStorage binding.
  Azure.Storage.Firewall:
    - storageAccount

  # Key Vault: network ACLs would block the pipeline's provisioning steps and MSDO scan
  # agent from accessing secrets; personal project on free tier without VNet.
  Azure.KeyVault.Firewall:
    - keyVault
