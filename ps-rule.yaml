# PSRule for Azure — rule exclusions for non-fixable findings.
# Both rules require VNet-based network ACLs which are unavailable on the Consumption Plan.
# See .gdnsuppress for detailed justifications.
#
# NOTE: 'suppression' (by resource name) did not work because resource names use
# uniqueString() at deploy time and cannot be matched statically. 'rule.exclude'
# prevents the rule from running at all, which is equivalent for a single-resource template.
rule:
  exclude:
    # Storage account firewall: network ACLs would break AzureWebJobsStorage binding
    # on Consumption Plan (no VNet integration available).
    - 'Azure.Storage.Firewall'
    # Key Vault firewall: network ACLs would block pipeline provisioning and MSDO agent.
    - 'Azure.KeyVault.Firewall'
