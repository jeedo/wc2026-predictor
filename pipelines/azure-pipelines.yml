trigger:
  branches:
    include:
      - main

variables:
  - group: wc2026-secrets          # holds: APISPORTS_API_KEY, ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
  - name: azureSubscription
    value: wc2026-service-connection
  - name: resourceGroup
    value: rg-wc2026
  - name: location
    value: eastus
  - name: pythonVersion
    value: '3.12'

stages:

  # ---------------------------------------------------------------------------
  # Stage 1: Infrastructure
  # Provisions all Azure resources and writes Key Vault secrets.
  # ---------------------------------------------------------------------------
  - stage: infra
    displayName: 'Deploy Infrastructure'
    jobs:
      - job: BicepDeploy
        displayName: 'Bicep + Key Vault secrets'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: SendTelegramNotification@0
            displayName: 'Notify Telegram: pipeline started'
            inputs:
              botToken: $(TELEGRAM_BOT_TOKEN)
              chats: $(TELEGRAM_CHAT_ID)
              buildNumber: true
              buildQueuedBy: true
              message: |
                🚀 <b>Pipeline started</b>
                Branch: <code>$(Build.SourceBranchName)</code>
                Commit: <code>$(Build.SourceVersion)</code>

          - task: AzureCLI@2
            displayName: 'Deploy main.bicep'
            name: BicepOutput
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                OUTPUT=$(az deployment group create \
                  --resource-group $(resourceGroup) \
                  --template-file infra/main.bicep \
                  --parameters \
                      location=$(location) \
                      apiSportsKey="$(APISPORTS_API_KEY)" \
                      anthropicKey="$(ANTHROPIC_API_KEY)" \
                      footballDataKey="$(FOOTBALL_DATA_API_KEY)" \
                      serpaKey="$(SERPA_API_KEY)" \
                  --query properties.outputs \
                  --output json)

                echo "##vso[task.setvariable variable=functionAppName;isOutput=true]$(echo $OUTPUT | jq -r .functionAppName.value)"
                echo "##vso[task.setvariable variable=staticWebAppName;isOutput=true]$(echo $OUTPUT | jq -r .staticWebAppName.value)"
                echo "##vso[task.setvariable variable=keyVaultUri;isOutput=true]$(echo $OUTPUT | jq -r .keyVaultUri.value)"

          - task: AzureCLI@2
            displayName: 'Provision Key Vault secrets'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                KV_NAME=$(az keyvault list \
                  --resource-group $(resourceGroup) \
                  --query "[0].name" --output tsv)

                # apisports-api-key
                az keyvault secret set \
                  --vault-name "$KV_NAME" \
                  --name apisports-api-key \
                  --value "$(APISPORTS_API_KEY)" > /dev/null

                # anthropic-api-key
                az keyvault secret set \
                  --vault-name "$KV_NAME" \
                  --name anthropic-api-key \
                  --value "$(ANTHROPIC_API_KEY)" > /dev/null

                # football-data-api-key
                az keyvault secret set \
                  --vault-name "$KV_NAME" \
                  --name football-data-api-key \
                  --value "$(FOOTBALL_DATA_API_KEY)" > /dev/null

                # serpa-api-key
                az keyvault secret set \
                  --vault-name "$KV_NAME" \
                  --name serpa-api-key \
                  --value "$(SERPA_API_KEY)" > /dev/null

                # cosmos-connection-string (pulled from Cosmos account)
                COSMOS_NAME=$(az cosmosdb list \
                  --resource-group $(resourceGroup) \
                  --query "[0].name" --output tsv)
                COSMOS_CONN=$(az cosmosdb keys list \
                  --name "$COSMOS_NAME" \
                  --resource-group $(resourceGroup) \
                  --type connection-strings \
                  --query "connectionStrings[0].connectionString" \
                  --output tsv)
                az keyvault secret set \
                  --vault-name "$KV_NAME" \
                  --name cosmos-connection-string \
                  --value "$COSMOS_CONN" > /dev/null

                echo "Key Vault secrets provisioned: apisports-api-key, anthropic-api-key, cosmos-connection-string"

          - task: SendTelegramNotification@0
            displayName: 'Notify Telegram: infrastructure stage result'
            condition: always()
            inputs:
              botToken: $(TELEGRAM_BOT_TOKEN)
              chats: $(TELEGRAM_CHAT_ID)
              taskStatus: true
              message: 'Stage: <b>Deploy Infrastructure</b>'

  # ---------------------------------------------------------------------------
  # Stage 2: Functions
  # Packages the Python function app with uv and deploys to Azure Functions.
  # ---------------------------------------------------------------------------
  - stage: functions
    displayName: 'Deploy Functions'
    dependsOn: infra
    variables:
      functionAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.functionAppName'] ]
    jobs:
      - job: FunctionsDeploy
        displayName: 'Deploy Functions with Remote Build'
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              cd functions
              echo "Preparing functions directory for remote build..."
              ls -la | grep -E "(pyproject|uv\.lock|function_app|fn_)"
            displayName: 'Verify pyproject.toml and uv.lock'

          - script: |
              cd functions
              # Exclude dev dependencies, tests, and cache
              zip -r ../functions.zip . \
                --exclude "*.pyc" \
                --exclude "__pycache__/*" \
                --exclude ".venv/*" \
                --exclude "tests/*" \
                --exclude "*.egg-info/*" \
                --exclude ".pytest_cache/*"
              ls -lh ../functions.zip
            displayName: 'Zip function app source'

          - task: AzureCLI@2
            displayName: 'Deploy to Azure Functions (Remote Build enabled)'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az functionapp deployment source config-zip \
                  --resource-group $(resourceGroup) \
                  --name "$(functionAppName)" \
                  --src functions.zip \
                  --build-remote true

          - task: SendTelegramNotification@0
            displayName: 'Notify Telegram: functions stage result'
            condition: always()
            inputs:
              botToken: $(TELEGRAM_BOT_TOKEN)
              chats: $(TELEGRAM_CHAT_ID)
              taskStatus: true
              message: 'Stage: <b>Deploy Functions</b>'

  # ---------------------------------------------------------------------------
  # Stage 3: Frontend
  # Builds the React/Vite app and publishes to Azure Static Web Apps.
  # ---------------------------------------------------------------------------
  - stage: frontend
    displayName: 'Deploy Frontend'
    dependsOn:
      - infra
      - functions
    variables:
      functionAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.functionAppName'] ]
      staticWebAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.staticWebAppName'] ]
    jobs:
      - job: FrontendDeploy
        displayName: 'npm build + AzureStaticWebApp deploy'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: |
              cd frontend
              npm ci
            displayName: 'Install npm dependencies'

          - script: |
              cd frontend
              FUNC_APP="$(functionAppName)"
              export VITE_API_BASE_URL="https://${FUNC_APP}.azurewebsites.net"
              npm run build
            displayName: 'Build React app (inject VITE_API_BASE_URL)'
            env:
              functionAppName: $(functionAppName)

          - task: AzureStaticWebApp@0
            displayName: 'Publish to Static Web App'
            inputs:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
              app_location: frontend/dist
              output_location: ''
              skip_app_build: true

          - task: SendTelegramNotification@0
            displayName: 'Notify Telegram: frontend stage result'
            condition: always()
            inputs:
              botToken: $(TELEGRAM_BOT_TOKEN)
              chats: $(TELEGRAM_CHAT_ID)
              taskStatus: true
              message: 'Stage: <b>Deploy Frontend</b>'

  # ---------------------------------------------------------------------------
  # Stage 4: Smoke Tests
  # Calls each fn-api endpoint and asserts HTTP 200 / expected shape.
  # ---------------------------------------------------------------------------
  - stage: smoke
    displayName: 'Smoke Tests'
    dependsOn:
      - infra
      - frontend
    variables:
      functionAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.functionAppName'] ]
    jobs:
      - job: SmokeTest
        displayName: 'POST-deploy API smoke tests'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              echo "Waiting 60s for Function App cold start..."
              sleep 60
            displayName: 'Wait for Function App warmup'

          - script: |
              set -euo pipefail
              API_BASE="https://$(functionAppName).azurewebsites.net/api"
              echo "Running smoke tests against $API_BASE"
              python scripts/smoke_test.py "$API_BASE"
            displayName: 'Run smoke_test.py'
            env:
              functionAppName: $(functionAppName)

          - task: SendTelegramNotification@0
            displayName: 'Notify Telegram: smoke tests result'
            condition: always()
            inputs:
              botToken: $(TELEGRAM_BOT_TOKEN)
              chats: $(TELEGRAM_CHAT_ID)
              taskStatus: true
              message: 'Stage: <b>Smoke Tests</b>'

  # ---------------------------------------------------------------------------
  # Stage 5: Notify
  # Sends a final pipeline summary to Telegram regardless of outcome.
  # ---------------------------------------------------------------------------
  - stage: notify
    displayName: 'Notify Pipeline Result'
    dependsOn:
      - infra
      - functions
      - frontend
      - smoke
    condition: always()
    variables:
      infraResult:     $[ stageDependencies.infra.BicepDeploy.result ]
      functionsResult: $[ stageDependencies.functions.FunctionsDeploy.result ]
      frontendResult:  $[ stageDependencies.frontend.FrontendDeploy.result ]
      smokeResult:     $[ stageDependencies.smoke.SmokeTest.result ]
    jobs:
      - job: SendSummary
        displayName: 'Send pipeline summary'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: SendTelegramNotification@0
            displayName: 'Notify Telegram: pipeline complete'
            inputs:
              botToken: $(TELEGRAM_BOT_TOKEN)
              chats: $(TELEGRAM_CHAT_ID)
              buildNumber: true
              buildQueuedBy: true
              teamUrl: true
              message: |
                🏁 <b>Pipeline complete</b>

                Infrastructure: $(infraResult)
                Functions:      $(functionsResult)
                Frontend:       $(frontendResult)
                Smoke Tests:    $(smokeResult)
