trigger:
  branches:
    include:
      - main

variables:
  - group: wc2026-secrets          # holds: APISPORTS_API_KEY, ANTHROPIC_API_KEY
  - name: azureSubscription
    value: wc2026-service-connection
  - name: resourceGroup
    value: rg-wc2026
  - name: location
    value: eastus
  - name: pythonVersion
    value: '3.12'

stages:

  # ---------------------------------------------------------------------------
  # Stage 0: Security Scanning
  # Runs in parallel with infra — no dependsOn so it does not add wall-clock
  # time to deployments.
  # Gitleaks is always blocking. MSDO starts non-blocking (continueOnError:
  # true); set to false once the initial finding baseline is resolved, then
  # add 'security' to the functions stage dependsOn.
  # ---------------------------------------------------------------------------
  - stage: security
    displayName: 'Security Scan'
    jobs:
      - job: Scan
        displayName: 'MSDO + Gitleaks'
        pool:
          vmImage: ubuntu-latest
        steps:

          # Gitleaks — blocks pipeline immediately if secrets found in code or git history
          - script: |
              curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
                | tar xz gitleaks
              ./gitleaks detect --source . --exit-code 1
            displayName: 'Gitleaks secret scan'

          # MSDO blocking scan — Bandit (Python SAST), Checkov (Bicep), Trivy (Python deps)
          - task: MicrosoftSecurityDevOps@1
            displayName: 'MSDO blocking scan (Bandit, Checkov, Trivy)'
            inputs:
              tools: 'bandit,checkov,trivy'

          # MSDO advisory scan — TemplateAnalyzer only, non-blocking.
          # AZR-000202 (Storage.Firewall) cannot be fixed on Consumption Plan:
          # resourceAccessRules does not support Microsoft.Web/sites and
          # AzureServices bypass does not cover Functions. Requires Premium + VNet.
          # Upstream suppression tracking: github.com/Azure/template-analyzer/issues/367
          - task: MicrosoftSecurityDevOps@1
            displayName: 'MSDO advisory scan (TemplateAnalyzer)'
            continueOnError: true
            inputs:
              tools: 'templateanalyzer'
              break: false

          # Publish SARIF findings as pipeline artifact for review
          # continueOnError: true because the output dir only exists when MSDO exits clean
          - task: PublishBuildArtifacts@1
            displayName: 'Publish SARIF results'
            condition: always()
            continueOnError: true
            inputs:
              PathtoPublish: '$(Agent.TempDirectory)/.msdo/result'
              ArtifactName: 'security-scan-results'

  # ---------------------------------------------------------------------------
  # Stage 1: Infrastructure
  # Provisions all Azure resources and writes Key Vault secrets.
  # ---------------------------------------------------------------------------
  - stage: infra
    displayName: 'Deploy Infrastructure'
    jobs:
      - job: BicepDeploy
        displayName: 'Bicep deploy'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: 'Deploy main.bicep'
            name: BicepOutput
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                OUTPUT=$(az deployment group create \
                  --resource-group $(resourceGroup) \
                  --template-file infra/main.bicep \
                  --parameters \
                      location=$(location) \
                      apiSportsKey="$(APISPORTS_API_KEY)" \
                      anthropicKey="$(ANTHROPIC_API_KEY)" \
                      footballDataKey="$(FOOTBALL_DATA_API_KEY)" \
                      serpaKey="$(SERPA_API_KEY)" \
                  --query properties.outputs \
                  --output json)

                echo "##vso[task.setvariable variable=functionAppName;isOutput=true]$(echo $OUTPUT | jq -r .functionAppName.value)"
                echo "##vso[task.setvariable variable=staticWebAppName;isOutput=true]$(echo $OUTPUT | jq -r .staticWebAppName.value)"
                echo "##vso[task.setvariable variable=keyVaultUri;isOutput=true]$(echo $OUTPUT | jq -r .keyVaultUri.value)"

          # Key Vault secrets are deployed by main.bicep (secretApiSports, secretAnthropic,
          # secretFootballData, secretSerpa, secretCosmos). No separate provisioning step needed.

  # ---------------------------------------------------------------------------
  # Stage 2: Functions
  # Packages the Python function app with uv and deploys to Azure Functions.
  # ---------------------------------------------------------------------------
  - stage: functions
    displayName: 'Deploy Functions'
    dependsOn: infra
    variables:
      functionAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.functionAppName'] ]
    jobs:
      - job: FunctionsDeploy
        displayName: 'Deploy Functions with Remote Build'
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              cd functions
              echo "Preparing functions directory for remote build..."
              ls -la | grep -E "(pyproject|uv\.lock|function_app|fn_)"
            displayName: 'Verify pyproject.toml and uv.lock'

          - script: |
              cd functions
              # Exclude dev dependencies, tests, and cache
              zip -r ../functions.zip . \
                --exclude "*.pyc" \
                --exclude "__pycache__/*" \
                --exclude ".venv/*" \
                --exclude "tests/*" \
                --exclude "*.egg-info/*" \
                --exclude ".pytest_cache/*"
              ls -lh ../functions.zip
            displayName: 'Zip function app source'

          - task: AzureCLI@2
            displayName: 'Deploy to Azure Functions (remote build)'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az functionapp deployment source config-zip \
                  --resource-group $(resourceGroup) \
                  --name "$(functionAppName)" \
                  --src functions.zip \
                  --build-remote true

  # ---------------------------------------------------------------------------
  # Stage 3: Frontend
  # Builds the React/Vite app and publishes to Azure Static Web Apps.
  # ---------------------------------------------------------------------------
  - stage: frontend
    displayName: 'Deploy Frontend'
    dependsOn:
      - infra
      - functions
    variables:
      functionAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.functionAppName'] ]
      staticWebAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.staticWebAppName'] ]
    jobs:
      - job: FrontendDeploy
        displayName: 'npm build + AzureStaticWebApp deploy'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: |
              cd frontend
              npm ci
            displayName: 'Install npm dependencies'

          - script: |
              cd frontend
              FUNC_APP="$(functionAppName)"
              export VITE_API_BASE_URL="https://${FUNC_APP}.azurewebsites.net"
              npm run build
            displayName: 'Build React app (inject VITE_API_BASE_URL)'
            env:
              functionAppName: $(functionAppName)

          - task: AzureStaticWebApp@0
            displayName: 'Publish to Static Web App'
            inputs:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
              app_location: frontend/dist
              output_location: ''
              skip_app_build: true

  # ---------------------------------------------------------------------------
  # Stage 4: Smoke Tests
  # Calls each fn-api endpoint and asserts HTTP 200 / expected shape.
  # ---------------------------------------------------------------------------
  - stage: smoke
    displayName: 'Smoke Tests'
    dependsOn:
      - infra
      - frontend
    variables:
      functionAppName: $[ stageDependencies.infra.BicepDeploy.outputs['BicepOutput.functionAppName'] ]
    jobs:
      - job: SmokeTest
        displayName: 'POST-deploy API smoke tests'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: |
              echo "Waiting 60s for Function App cold start..."
              sleep 60
            displayName: 'Wait for Function App warmup'

          - script: |
              set -euo pipefail
              API_BASE="https://$(functionAppName).azurewebsites.net/api"
              echo "Running smoke tests against $API_BASE"
              python scripts/smoke_test.py "$API_BASE"
            displayName: 'Run smoke_test.py'
            env:
              functionAppName: $(functionAppName)
